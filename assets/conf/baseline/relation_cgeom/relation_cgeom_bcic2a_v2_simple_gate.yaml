# Relation-CGeom v2 simple-gate + BCIC2a standalone training config
seed: 42
master_port: 51542
multitask: false
model_type: relation_cgeom
fs: 256

data:
  batch_size: 32
  num_workers: 4
  datasets:
    bcic_2a: finetune

model:
  pretrained_path: null
  output_dims: 320
  hidden_dims: 64
  depth: 7
  bands:
    - [8.0, 13.0]
    - [13.0, 20.0]
    - [20.0, 30.0]
  use_raw_branch: true
  use_complex_branch: true
  use_hyperbolic_branch: true
  share_band_encoder: false
  band_fusion_type: concat_linear
  hyperbolic_depth: 1
  hyperbolic_curvature: 1.0
  learnable_curvature: true

  # v2 simple-gate fusion:
  # local_repr = raw_residual + complex_residual
  # relation_gate = Hyperbolic(raw_global, band1_global, band2_global, band3_global)
  # main_repr = local_repr * (1 + relation_gate_scale * relation_gate)
  use_raw_residual: true
  use_complex_residual: true
  use_hyper_relation: true
  use_gated_raw_residual: false
  use_gated_complex_residual: false
  local_fusion_type: add
  relation_condition_type: gate
  relation_gate_scale: 0.1
  relation_film_scale: 0.1

  mask_mode: binomial
  downstream_mask: all_true

  classifier_head:
    head_type: avg_pool
    hidden_dims: [128]
    dropout: 0.3
    attn_n_head: 4
    attn_head_dim: 64
    fusion_mode: dual
    fusion_n_head: 4
    fusion_head_dim: 64
    fusion_use_rope: true
    fusion_rope_theta: 10000.0
    fusion_max_seq_len: 1024

training:
  max_epochs: 20
  weight_decay: 0.01
  max_grad_norm: 3.0

  lr_schedule: onecycle
  max_lr: 5e-4
  encoder_lr_scale: 0.1
  warmup_epochs: 5
  warmup_scale: 1e-2
  pct_start: 0.2
  min_lr: 1e-6

  freeze_encoder: false
  use_amp: false
  label_smoothing: 0.0

  lora:
    use_lora: false
    lora_r: 8
    lora_alpha: 16
    lora_dropout: 0.0
    lora_target_modules: [default]
    lora_exclude_modules: null
    lora_target_type: default
    lora_scope: transformer
    lora_lr_scale: 1.0

logging:
  experiment_name: relation_cgeom_bcic2a_v2_simple_gate
  run_dir: assets/run
  run_group: v2_simple_gate
  use_cloud: false
  cloud_backend: wandb
  project: relation_cgeom
  entity: null
  api_key: null
  offline: true
  tags: [relation_cgeom, bcic_2a, v2_simple_gate]
  log_step_interval: 10
  ckpt_interval: 1
  save_best_only: true
  save_last_checkpoint: true
  monitor_split: eval
  monitor_metric: balanced_acc
  monitor_mode: max
